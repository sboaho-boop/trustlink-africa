<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path d="M60 15 L90 10 L90 50 Q90 75 60 90 Q30 75 30 50 L30 10 Z" fill="url(#grad)" />
  
  <!-- Checkmark inside shield -->
  <polyline points="42,48 55,62 78,35" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Link/chain icon -->
  <circle cx="60" cy="100" r="8" fill="none" stroke="url(#grad)" stroke-width="3"/>
  <circle cx="78" cy="100" r="8" fill="none" stroke="url(#grad)" stroke-width="3"/>
  <line x1="68" y1="100" x2="70" y2="100" stroke="url(#grad)" stroke-width="3"/>
  
  <!-- Trust text -->
  <text x="110" y="58" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#1a1a1a">Trust</text>
  
  <!-- Link text in green -->
  <text x="218" y="58" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#22c55e">Link</text>
  
  <!-- Africa text -->
  <text x="110" y="82" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#666666" letter-spacing="4">AFRICA</text>
</svg>
